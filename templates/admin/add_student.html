{% extends "layouts/dashboard_base.html" %}

{% block title %}Add Student{% endblock %}

{% block page_title %}Add Student{% endblock %}

{% block sidebar %}
{{ super() }}
{% endblock %}

{% block content %}

<h2>Add New Student</h2>

<form method="POST" class="student-form">

    <input type="text" name="student_id" placeholder="Student ID" required>

    <input type="text" name="first_name" placeholder="First Name" required>

    <input type="text" name="last_name" placeholder="Last Name" required>

    <input type="email" name="email" placeholder="Email" required>

    <input type="text" name="phone" placeholder="Phone Number">

    <select name="gender" required>

        <option value="">Select Gender</option>

        <option>Male</option>

        <option>Female</option>

    </select>

    <select name="department_id" required>

        <option value="">Select Department</option>

        {% for department in departments %}

        <option value="{{ department.id }}">

            {{ department.department_name }}

        </option>

        {% endfor %}

    </select>

    <input type="number" name="semester" min="1" max="8" placeholder="Semester" required>

    <input type="number" step="0.01" name="cgpa" min="0" max="10" placeholder="CGPA" required>

    <input type="number" step="0.01" name="attendance" min="0" max="100" placeholder="Attendance (%)" required>

    <button type="submit" class="btn-primary">

        Save Student

    </button>

</form>

{% endblock %}
