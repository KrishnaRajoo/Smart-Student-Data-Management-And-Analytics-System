{% extends "layouts/dashboard_base.html" %}

{% block content %}

<div class="page-header">
    <h2>Edit Teacher</h2>
    <a href="{{ url_for('teacher_management.teachers') }}" class="btn-secondary">
        ← Back to Teachers
    </a>
</div>

<form method="POST" class="form-card">

    <div class="form-grid">

        <div class="form-group">
            <label>Teacher ID</label>
            <input
                type="text"
                name="teacher_id"
                value="{{ teacher.teacher_id }}"
                required>
        </div>

        <div class="form-group">
            <label>First Name</label>
            <input
                type="text"
                name="first_name"
                value="{{ teacher.first_name }}"
                required>
        </div>

        <div class="form-group">
            <label>Last Name</label>
            <input
                type="text"
                name="last_name"
                value="{{ teacher.last_name }}"
                required>
        </div>

        <div class="form-group">
            <label>Email</label>
            <input
                type="email"
                name="email"
                value="{{ teacher.email }}"
                required>
        </div>

        <div class="form-group">
            <label>Phone</label>
            <input
                type="text"
                name="phone"
                value="{{ teacher.phone }}"
                required>
        </div>

        <div class="form-group">

    <label>New Password</label>

    <input
        type="password"
        name="password"
        placeholder="Leave blank to keep existing password">

</div>

        <div class="form-group">
            <label>Gender</label>

            <select name="gender" required>

                <option value="Male"
                    {% if teacher.gender == "Male" %}selected{% endif %}>
                    Male
                </option>

                <option value="Female"
                    {% if teacher.gender == "Female" %}selected{% endif %}>
                    Female
                </option>

                <option value="Other"
                    {% if teacher.gender == "Other" %}selected{% endif %}>
                    Other
                </option>

            </select>
        </div>

        <div class="form-group">
            <label>Department</label>

            <select name="department_id" required>

                {% for dept in departments %}

                <option
                    value="{{ dept.id }}"
                    {% if teacher.department_id == dept.id %}selected{% endif %}>

                    {{ dept.department_name }}

                </option>

                {% endfor %}

            </select>
        </div>

        <div class="form-group">
            <label>Designation</label>
            <input
                type="text"
                name="designation"
                value="{{ teacher.designation }}"
                required>
        </div>

        <div class="form-group">
            <label>Qualification</label>
            <input
                type="text"
                name="qualification"
                value="{{ teacher.qualification }}"
                required>
        </div>

        <div class="form-group">
            <label>Joining Date</label>
            <input
                type="date"
                name="joining_date"
                value="{{ teacher.joining_date.strftime('%Y-%m-%d') if teacher.joining_date else '' }}"
                required>
        </div>

        <div class="form-group">
            <label>Status</label>

            <select name="status">

                <option value="Active"
                    {% if teacher.status == "Active" %}selected{% endif %}>
                    Active
                </option>

                <option value="Inactive"
                    {% if teacher.status == "Inactive" %}selected{% endif %}>
                    Inactive
                </option>

            </select>
        </div>

    </div>

    <div style="margin-top:30px;">

        <button type="submit" class="btn-primary">
            Update Teacher
        </button>

        <a href="{{ url_for('teacher_management.teachers') }}" class="btn-primary">
            Cancel
        </a>

    </div>

</form>

{% endblock %}
